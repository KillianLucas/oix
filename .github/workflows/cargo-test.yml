name: cargo-test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: cargo-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt-and-test:
    name: fmt + test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev
      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: codex-rs
      - name: cargo fmt --check
        run: cargo fmt -- --config imports_granularity=Item --check
      - name: Enable unprivileged user namespaces
        run: |
          # Required for bubblewrap (sandbox tests) on Linux CI runners.
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          if sudo sysctl -a 2>/dev/null | grep -q '^kernel.apparmor_restrict_unprivileged_userns'; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
      - name: cargo test
        run: cargo test --workspace --locked --no-fail-fast
        env:
          RUST_MIN_STACK: "8388608" # 8 MiB
